name: Publish

# Triggered when a version tag is pushed: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  # ── 1. Validate the tag matches the declared package version ──────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check tag matches package version
        run: |
          PKG_VERSION=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: pyproject.toml version ($PKG_VERSION) ≠ tag ($TAG_VERSION)"
            exit 1
          fi

  # ── 2. Run the full test matrix before publishing ─────────────────────────
  test:
    needs: validate
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest

  # ── 3. Build wheel + sdist ─────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 4. Publish to PyPI via OIDC Trusted Publishing ────────────────────────
  #
  # Configure once in PyPI project settings:
  #   Publisher: GitHub Actions
  #   Owner:     <your-github-username>
  #   Repo:      retra
  #   Workflow:  publish.yml
  #   Environment: pypi
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/retra
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
